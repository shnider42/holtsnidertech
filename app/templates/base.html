<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ business_name }}{% endblock %}</title>
    <meta
        name="description"
        content="{% block meta_description %}Holtsnider Tech provides practical technical consulting, troubleshooting, process improvement, automation, and website/system support for businesses that need clarity and real-world solutions.{% endblock %}"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive-fixes.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/staging-polish.css') }}" />
</head>
<body>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='js/site.js') }}"></script>
</body>
</html>
